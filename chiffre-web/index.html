<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiffre - 法语听力练习</title>
    <meta name="description" content="Chiffre - 法语数字听力练习应用，包含数字、电话、价格、时间等多种模式">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Didot:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 动态背景 -->
    <div class="animated-background">
        <div class="gradient-layer"></div>
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="particles" id="particles"></div>
    </div>

    <!-- 主页面 -->
    <main id="home-page" class="page active">
        <h1 class="title">Chiffre</h1>
        
        <div class="content-area">
            <!-- 核心卡片 -->
            <div class="main-card" id="main-card">
                <div class="card-content" id="card-content">
                    <div class="listen-icon" id="listen-icon">
                        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </div>
                    <div class="answer-display hidden" id="answer-display"></div>
                </div>
            </div>
            
            <!-- 提示文字 -->
            <p class="hint-text" id="hint-text">Écoutez...</p>
        </div>
        
        <!-- 底部控制栏 -->
        <div class="control-bar">
            <button class="circle-btn" id="replay-btn" title="重新播放">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
            </button>
            
            <button class="main-btn" id="action-btn">Révéler</button>
            
            <button class="circle-btn" id="settings-btn" title="设置">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
                </svg>
            </button>
        </div>
    </main>

    <!-- 设置面板 -->
    <div class="settings-panel hidden" id="settings-panel">
        <div class="settings-content">
            <div class="settings-handle"></div>
            <h2 class="settings-title">Réglages (设置)</h2>
            
            <!-- 模式选择 -->
            <div class="settings-section">
                <h3 class="section-label">Mode (模式)</h3>
                <div class="mode-scroll">
                    <div class="mode-list" id="mode-list"></div>
                </div>
            </div>
            
            <!-- 难度范围 (仅数字模式显示) -->
            <div class="settings-section" id="range-section">
                <h3 class="section-label">范围: <span id="range-display">0 - 100</span></h3>
                <input type="range" id="range-slider" min="10" max="9999" value="100" step="10">
                <div class="preset-buttons">
                    <button class="preset-btn" data-value="10">简单 (10)</button>
                    <button class="preset-btn active" data-value="100">中等 (100)</button>
                    <button class="preset-btn" data-value="1000">困难 (1000)</button>
                </div>
            </div>
            
            <!-- 模式描述 (非数字模式显示) -->
            <div class="settings-section mode-description hidden" id="mode-description">
                <div class="description-icon" id="description-icon"></div>
                <p class="description-text" id="description-text"></p>
            </div>
            
            <!-- 关闭按钮 -->
            <button class="close-settings-btn" id="close-settings">关闭</button>
        </div>
    </div>

    <!-- 参考页面 -->
    <div id="reference-page" class="page hidden">
        <h1 class="title">Référence</h1>
        
        <div class="reference-content">
            <!-- Les Bases (1-20) -->
            <section class="number-section">
                <div class="section-header">
                    <h2 class="section-title">Les Bases</h2>
                    <span class="section-subtitle">基础数字 1-20</span>
                </div>
                <div class="number-grid" id="bases-grid"></div>
            </section>
            
            <!-- Les Dizaines -->
            <section class="number-section">
                <div class="section-header">
                    <h2 class="section-title">Les Dizaines</h2>
                    <span class="section-subtitle">整十进位</span>
                </div>
                <div class="number-grid" id="dizaines-grid"></div>
            </section>
            
            <!-- Les Complexes -->
            <section class="number-section">
                <div class="section-header">
                    <h2 class="section-title">Les Complexes</h2>
                    <span class="section-subtitle">进位 · 大数 · 无限</span>
                </div>
                <div class="number-grid" id="complexes-grid"></div>
            </section>
        </div>
    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <button class="nav-btn active" data-page="home">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 3L4 9v12h5v-7h6v7h5V9z"/>
            </svg>
            <span>练习</span>
        </button>
        <button class="nav-btn" data-page="reference">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
            </svg>
            <span>参考</span>
        </button>
    </nav>

    <script src="js/speechManager.js"></script>
    <script src="js/numberTrainer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
